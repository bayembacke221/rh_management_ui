<div class="min-h-screen flex items-center justify-center bg-muted/40 px-4">
  <div class="w-full max-w-sm">
    <!-- Header -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-12 h-12 rounded-lg bg-primary mb-4">
        <svg class="w-6 h-6 text-primary-foreground" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z" />
        </svg>
      </div>
      <h1 class="text-2xl font-semibold tracking-tight text-foreground">RH Management</h1>
      <p class="text-sm text-muted-foreground mt-1">Connectez-vous a votre compte</p>
    </div>

    <!-- Card -->
    <div class="rounded-lg border bg-card shadow-sm p-6">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
        <!-- Username -->
        <div class="space-y-2">
          <label for="username" class="text-sm font-medium leading-none text-foreground">
            Nom d'utilisateur
          </label>
          <input
            id="username"
            type="text"
            formControlName="username"
            placeholder="Entrez votre identifiant"
            class="flex h-9 w-full rounded-md border border-input bg-transparent px-3 py-1 text-sm shadow-sm transition-colors placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring"
            [class.border-destructive]="submitted && f['username'].errors"
            [class.focus-visible:ring-destructive]="submitted && f['username'].errors">
          @if (submitted && f['username'].errors) {
            <p class="text-xs text-destructive">Le nom d'utilisateur est requis</p>
          }
        </div>

        <!-- Password -->
        <div class="space-y-2">
          <div class="flex items-center justify-between">
            <label for="password" class="text-sm font-medium leading-none text-foreground">
              Mot de passe
            </label>
            <a href="#" class="text-xs text-muted-foreground hover:text-foreground transition-colors">
              Mot de passe oublie ?
            </a>
          </div>
          <input
            id="password"
            type="password"
            formControlName="password"
            placeholder="Entrez votre mot de passe"
            class="flex h-9 w-full rounded-md border border-input bg-transparent px-3 py-1 text-sm shadow-sm transition-colors placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring"
            [class.border-destructive]="submitted && f['password'].errors"
            [class.focus-visible:ring-destructive]="submitted && f['password'].errors">
          @if (submitted && f['password'].errors) {
            <p class="text-xs text-destructive">Le mot de passe est requis</p>
          }
        </div>

        <!-- Remember me -->
        <div class="flex items-center space-x-2">
          <input
            id="remember-me"
            type="checkbox"
            class="h-4 w-4 rounded border border-input bg-transparent shadow-sm focus:ring-1 focus:ring-ring accent-primary">
          <label for="remember-me" class="text-sm text-muted-foreground leading-none cursor-pointer">
            Se souvenir de moi
          </label>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          [disabled]="loading"
          class="inline-flex items-center justify-center w-full h-9 rounded-md bg-primary px-4 text-sm font-medium text-primary-foreground shadow transition-colors hover:bg-primary/90 focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:pointer-events-none disabled:opacity-50">
          @if (loading) {
            <svg class="animate-spin -ml-1 mr-2 h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Connexion en cours...
          } @else {
            Se connecter
          }
        </button>

        <!-- Error -->
        @if (error) {
          <div class="rounded-md bg-destructive/10 px-3 py-2 animate-fade-in">
            <div class="flex items-center gap-2">
              <svg class="h-4 w-4 text-destructive shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.28 7.22a.75.75 0 00-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 101.06 1.06L10 11.06l1.72 1.72a.75.75 0 101.06-1.06L11.06 10l1.72-1.72a.75.75 0 00-1.06-1.06L10 8.94 8.28 7.22z" clip-rule="evenodd" />
              </svg>
              <p class="text-sm text-destructive">{{ error }}</p>
            </div>
          </div>
        }
      </form>
    </div>

    <!-- Footer -->
    <p class="text-center text-xs text-muted-foreground mt-6">
      RH Management &copy; 2026. Tous droits reserves.
    </p>
  </div>
</div>

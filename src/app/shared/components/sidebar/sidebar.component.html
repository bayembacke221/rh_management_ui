<div class="fixed h-full bg-gray-800 transition-all duration-300 ease-in-out z-20"
     [ngClass]="isOpen ? 'w-64' : 'w-16'">

  <!-- Logo section -->
  <div class="flex items-center justify-center h-16 bg-gray-900">
    <div *ngIf="isOpen" class="text-white font-bold text-xl">RH Manager</div>
    <div *ngIf="!isOpen" class="text-white font-bold text-xl">RH</div>
  </div>

  <!-- Navigation -->
  <nav class="mt-5 px-2 h-[calc(100%-4rem)] overflow-y-auto">
    <div *ngFor="let item of navItems" class="mb-1">
      <!-- Main menu item -->
      <div [routerLink]="!item.children ? item.route : undefined"
           [routerLinkActive]="!item.children ? 'bg-gray-900 text-white' : ''"
           (click)="item.children ? toggleSubMenu(item) : null"
           class="group flex items-center px-2 py-2 text-sm font-medium rounded-md cursor-pointer"
           [ngClass]="{
             'hover:bg-gray-700': !item.children || !item.expanded,
             'text-gray-300': !item.children || !item.expanded || !isRouteActive(item.route),
             'bg-gray-900 text-white': item.expanded
           }">

        <!-- Icon -->
        <svg class="h-6 w-6"
             [ngClass]="{
               'mr-3': isOpen,
               'mx-auto': !isOpen,
               'text-gray-400': !item.children || !item.expanded || !isRouteActive(item.route),
               'text-white': item.expanded || isRouteActive(item.route),
               'group-hover:text-gray-300': !item.children || !item.expanded || !isRouteActive(item.route)
             }"
             xmlns="http://www.w3.org/2000/svg"
             fill="none"
             viewBox="0 0 24 24"
             stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="item.icon" />
        </svg>

        <span *ngIf="isOpen" class="flex-1 truncate">{{ item.label }}</span>

        <svg *ngIf="isOpen && item.children"
             class="ml-auto h-5 w-5 transform transition-transform duration-150"
             [ngClass]="{'rotate-180': item.expanded}"
             xmlns="http://www.w3.org/2000/svg"
             viewBox="0 0 20 20"
             fill="currentColor">
          <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
        </svg>
      </div>

      <!-- Submenu items -->
      <div *ngIf="item.children && item.expanded && isOpen"
           class="mt-1 space-y-1 pl-6">
        <a *ngFor="let child of item.children"
           [routerLink]="child.route"
           routerLinkActive="bg-gray-700 text-white"
           class="group flex items-center px-2 py-2 text-sm font-medium rounded-md text-gray-300 hover:bg-gray-700 hover:text-white truncate">
          {{ child.label }}
        </a>
      </div>
    </div>
  </nav>

  <!-- App version -->
  <div class="absolute bottom-0 w-full p-4 border-t border-gray-700">
    <div *ngIf="isOpen" class="text-gray-400 text-xs text-center">
      Version 1.0.0
    </div>
    <div *ngIf="!isOpen" class="text-gray-400 text-xs text-center">
      v1.0
    </div>
  </div>
</div>
